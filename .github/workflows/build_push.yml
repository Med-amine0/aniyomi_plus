name: CI

permissions:
  contents: write

on:
  push:
    branches:
      - '*'
    tags:
      - v*

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build app
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK
        uses: actions/setup-java@3a4f6e1af504cf6a31855fa899c6aa5355ba6c12 # v4.7.0
        with:
          java-version: 17
          distribution: temurin

      - name: Set up gradle
        uses: gradle/actions/setup-gradle@94baf225fe0a508e581a564467443d0e2379123b # v4.3.0

      - name: Decode Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Run unit tests
        run: ./gradlew testReleaseUnitTest

      - name: Upload Release APK
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: aniyomi-plus-release-${{ github.sha }}
          path: app/build/outputs/apk/release/app-arm64-v8a-release.apk

      - name: Upload mapping
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: mapping-${{ github.sha }}
          path: app/build/outputs/mapping/release

      # Create release for tags (works for forks)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          name: Aniyomi Plus ${{ github.ref_name }}
          body: |
            ## Aniyomi Plus Fork

            ### Features
            - Dashboard with AniList API integration
            - Genre pills and tags dropdown
            - Anime & Movies discovery
            - Nested categories support
            - Configurable library columns
            - **Torrent Streaming (TorrServer)** - Stream anime directly from magnet links and .torrent files

            ### Torrent Streaming
            Built-in torrent streaming support powered by TorrServer:
            - Stream anime directly from magnet links and .torrent files
            - Embedded TorrServer (no external server needed)
            - Configurable port and custom trackers in Player Settings
            - Auto-starts when playing torrent content

            ### API
            Uses [AniList GraphQL API](https://github.com/AniList/docs) for anime discovery.

            ### Credits
            - [Animetail](https://github.com/nerdXD/Animetail) - TorrServer implementation reference

            ### Download
            Download the debug APK from the Artifacts section.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
